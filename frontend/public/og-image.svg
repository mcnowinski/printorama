<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="#171717" stroke="#262626" stroke-width="2"/>

  <text x="600" y="220" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="#f5f5f5" text-anchor="middle" letter-spacing="1">Fab-O-Rama</text>
  <text x="600" y="280" font-family="system-ui, sans-serif" font-size="26" font-weight="400" fill="#a3a3a3" text-anchor="middle" letter-spacing="4" text-transform="uppercase">Ut Prosim Solidus</text>

  <!-- 3D Isometric Cube -->
  <g transform="translate(600, 430)">
    <!-- Top face (orange) -->
    <polygon points="0,-50 50,-25 0,0 -50,-25" fill="#FF6600" opacity="0.95"/>
    <!-- Left face (maroon) -->
    <polygon points="-50,-25 0,0 0,50 -50,25" fill="#861F41" opacity="0.9"/>
    <!-- Right face (darker maroon) -->
    <polygon points="0,0 50,-25 50,25 0,50" fill="#6B1A2E" opacity="0.85"/>
  </g>
</svg>
